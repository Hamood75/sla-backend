services:
  db:
    image: postgres:16-alpine
    container_name: sla-db
    environment:
      POSTGRES_DB: sla_db
      POSTGRES_USER: sla_user
      POSTGRES_PASSWORD: sla_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sla_user -d sla_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sla-backend
    ports:
      - "9201:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-dev-only-change-me
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,api.streetlabsafrica.org}
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=sla_db
      - DB_USER=sla_user
      - DB_PASSWORD=sla_pass
      - DB_HOST=db
      - DB_PORT=5432
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
      - FRONTEND_URL=http://localhost:5173
      - PUBLIC_SITE_URL=https://streetlabsafrica.org
    volumes:
      - ./media:/app/media
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

volumes:
  postgres_data:
