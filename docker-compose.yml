services:
  db:
    image: postgres:16-alpine
    container_name: sla-db
    environment:
      POSTGRES_DB: sla_db
      POSTGRES_USER: sla_user
      POSTGRES_PASSWORD: sla_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sla_user -d sla_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sla-backend
    ports:
      - "9201:8000"
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=django-insecure-dev-only-change-me
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,api.streetlabsafrica.org}
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=sla_db
      - DB_USER=sla_user
      - DB_PASSWORD=sla_pass
      - DB_HOST=db
      - DB_PORT=5432
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://streetlabsafrica.org,https://www.streetlabsafrica.org,http://localhost:5173,http://127.0.0.1:5173}
      - FRONTEND_URL=${FRONTEND_URL:-https://streetlabsafrica.org}
      - PUBLIC_SITE_URL=${PUBLIC_SITE_URL:-https://streetlabsafrica.org}
      - EMAIL_BACKEND=${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      - EMAIL_HOST=${EMAIL_HOST:-nxmail.nexacon.africa}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-True}
      - EMAIL_USE_SSL=${EMAIL_USE_SSL:-False}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-noreply@streetlabsafrica.org}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-noreply@streetlabsafrica.org}
      - CONTACT_NOTIFY_EMAIL=${CONTACT_NOTIFY_EMAIL:-}
    volumes:
      - ./media:/app/media
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

volumes:
  postgres_data:
