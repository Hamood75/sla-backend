# Reverse proxy for the Django API.
# 413 Content Too Large on hero video uploads is usually this limit being too low
# (nginx default is 1m). Reload nginx after changing: nginx -s reload

client_max_body_size 600M;

upstream sla_api {
    server web:8000;
}

server {
    listen 80;
    server_name api.streetlabsafrica.org;

    client_max_body_size 600M;
    client_body_timeout 600s;
    proxy_connect_timeout 600s;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://sla_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Public traffic is HTTPS (Cloudflare); origin nginx listens on :80.
        proxy_set_header X-Forwarded-Proto https;
        # Stream large video uploads instead of buffering to disk first
        proxy_request_buffering off;
        proxy_http_version 1.1;
        client_max_body_size 600M;
    }
}
